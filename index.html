<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBuddy</title>
    <link rel="stylesheet" href="./src/sass/main.scss">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="shortcut icon" href="/images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
</head>

<body>
    <main id="main" class="">
        <div id="loadingOverlay" class="hidden">
            <div id="loadingIcon" class="hidden">För jag vill resa!</div>
        </div>
        <header>
            <img src="/images/travelbuddy-512.png" alt="TravelBuddy logotyp" width="512" height="512" id="logo">
        </header>
        <section id="country-section">
            <h1 id="headline"></h1>
            <div id="country-search" class="hidden">
                <div class="country">
                    <form id="countryForm">
                        <label for="country-name-input" class="hidden">Sök land:</label>
                        <div>
                            <input type="text" id="country-name-input" name="country" autocomplete="off" placeholder="Skriv land...">
                            <button type="button" id="search-button" class="btn">Sök<svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="#1f1f1f"><path d="M765-144 526-383q-30 22-65.79 34.5-35.79 12.5-76.18 12.5Q284-336 214-406t-70-170q0-100 70-170t170-70q100 0 170 70t70 170.03q0 40.39-12.5 76.18Q599-464 577-434l239 239-51 51ZM384-408q70 0 119-49t49-119q0-70-49-119t-119-49q-70 0-119 49t-49 119q0 70 49 119t119 49Z"/></svg></button>
                        </div>
                        <div id="country-error"></div>
                    </form>
                </div>
            </div>
            <div id="countriesDiv">
                <button id="moreCountries" class="btn">Visa alla länder<svg xmlns="http://www.w3.org/2000/svg" id="arrowIcon" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/></svg></button>
                <div id="countriesDisplay" class="hidden">
                    <ul id="countrylist"></ul>
                </div>
            </div>
            <div id="country-card"></div>
            <div id="showArea">
                <div id="map" class="hidden"></div>
                <div id="weatherDiagram" class="hidden"></div>
                <div id="currency-converter" class="hidden"></div>
            </div>
        </section>
    </main>
    <!--<div id="loader" class="spinner hidden"></div> -->

            <a href="/docs/index.html" class="jsdoc" target="_blank">Dokumentation JSDoc</a>
        </div>
        Copyright &copy; 2026 TravelBuddy gjord av Filip Bergander
    </footer> -->
    <script defer type="module" src="/src/js/countries.js"></script>
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
