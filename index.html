<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projektuppgift</title>
    <link rel="stylesheet" href="./src/sass/main.scss">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>

<body>
    <!--
     <header>
        <img src="/currencyicon.svg" alt="Valutakompis logotyp" width="150" height="150" id="logo">

    <!--<div id="loadingIcon" class="loadingIcon">För jag vill resa!</div> -->
    <main id="main" class="">
        <section id="country-section">
            <div id="country-search">
                <h1>Vilket land vill du resa till?</h1>
                <div class="country">
                    <label for="country" class="hidden">Sök land:</label>
                    <div>
                        <input type="text" id="country-name" name="country" placeholder="Skriv land...">
                        <button type="button" id="search-button" class="btn">Sök</button>
                    </div>
                    <div id="country-error"></div>
                </div>
            </div>
            <div id="countriesDiv">
                <button id="moreCountries" class="btn">Visa alla länder<span id="arrowIcon"
                        class="material-symbols-outlined">
                        keyboard_arrow_down
                    </span></button>
                <div id="countriesDisplay" class="hidden">
                    <ul id="countrylist"></ul>
                </div>
            </div>
            <div id="country-card"></div>
            <div id="showArea">
                <div id="map" class="hidden"></div>
                <div id="weatherDiagram" class="hidden"></div>
                <div id="currency-converter" class="hidden"></div>
            </div>
        </section>
    </main>
    <!--<div id="loader" class="spinner hidden"></div> -->
    <footer id="footer" class="hidden">
        <div class="documentation">
            <a href="/docs/index.html" class="jsdoc" target="_blank">Dokumentation JSDoc</a>
        </div>
        Copyright &copy; 2026 Valutakompis gjord av Filip Bergander
    </footer>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/countries.js"></script>
    <script type="module" src="/src/js/currency.js"></script>
</body>

</html>
